<div class="auth-page">
  <div class="auth-card">
    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to your Kudos account</p>

    @if (error()) {
      <div class="error-banner">{{ error() }}</div>
    }

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="field">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          required
          email
          placeholder="you@company.com"
        />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          minlength="6"
          placeholder="••••••••"
        />
      </div>

      <button type="submit" [disabled]="loginForm.invalid || loading()">
        @if (loading()) {
          Signing in...
        } @else {
          Sign In
        }
      </button>
    </form>

    <p class="switch-link">
      Don't have an account? <a routerLink="/register">Sign up</a>
    </p>
  </div>
</div>
